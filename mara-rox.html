<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mara Rox - News Broadcast | Ombra Prime</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-dark: #050608;
            --bg-card: #0a0c0f;
            --cyan: #00f7ff;
            --gold: #ff9d00;
            --text: #e0e0e0;
            --text-dim: #888;
        }
        
        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 247, 255, 0.2);
        }
        
        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--cyan), var(--gold));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        h1 {
            font-size: 1.5rem;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0, 247, 255, 0.5);
        }
        
        .subtitle {
            color: var(--text-dim);
            font-size: 0.85rem;
        }
        
        .back-link {
            color: var(--cyan);
            text-decoration: none;
            font-size: 0.85rem;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(0, 247, 255, 0.2);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .card h2 {
            color: var(--cyan);
            font-size: 1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        textarea {
            width: 100%;
            min-height: 120px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 247, 255, 0.3);
            border-radius: 6px;
            padding: 15px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            margin-bottom: 15px;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 247, 255, 0.2);
        }
        
        textarea::placeholder {
            color: var(--text-dim);
        }
        
        .btn {
            background: linear-gradient(135deg, var(--cyan), #00c4cc);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 247, 255, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .dimension-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .dim-btn {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 247, 255, 0.3);
            color: var(--text);
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .dim-btn:hover {
            border-color: var(--cyan);
            background: rgba(0, 247, 255, 0.1);
        }
        
        .dim-btn.active {
            background: rgba(0, 247, 255, 0.2);
            border-color: var(--cyan);
            color: var(--cyan);
        }
        
        .mode-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
        }
        
        .mode-badge {
            font-size: 0.85rem;
            padding: 5px 10px;
            border-radius: 4px;
            background: rgba(0, 247, 255, 0.15);
            color: var(--cyan);
        }
        
        .mode-badge.agent {
            background: rgba(255, 157, 0, 0.15);
            color: var(--gold);
        }
        
        .mode-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        .mode-btn:hover {
            background: rgba(255, 157, 0, 0.1);
        }
        
        .status {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 247, 255, 0.1);
            border-radius: 6px;
            font-size: 0.85rem;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.error {
            background: rgba(255, 0, 0, 0.1);
            color: #ff6b6b;
        }
        
        .status.success {
            background: rgba(0, 255, 100, 0.1);
            color: #6bff6b;
        }
        
        .clips-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .clips-header h2 {
            margin-bottom: 0;
        }
        
        .refresh-btn {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
        }
        
        .refresh-btn:hover {
            background: rgba(0, 247, 255, 0.1);
        }
        
        .clip-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .clip-item:hover {
            border-color: var(--cyan);
            background: rgba(0, 247, 255, 0.05);
        }
        
        .clip-info h3 {
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 5px;
        }
        
        .clip-info p {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 5px;
        }
        
        .clip-info .prompt {
            font-style: italic;
            color: var(--gold);
            font-size: 0.8rem;
        }
        
        .clip-actions {
            display: flex;
            gap: 10px;
        }
        
        .clip-actions a {
            background: rgba(0, 247, 255, 0.1);
            color: var(--cyan);
            padding: 8px 15px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        
        .clip-actions a:hover {
            background: var(--cyan);
            color: #000;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            color: var(--text-dim);
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        
        .empty-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .generating {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">📺</div>
            <div>
                <h1>Mara Rox</h1>
                <p class="subtitle">News Broadcast | The Spire Studios</p>
            </div>
            <a href="index.html" class="back-link">← Back to Control Center</a>
        </header>
        
        <div class="card">
            <h2>🎬 Generate Broadcast</h2>
            <textarea id="scriptInput" placeholder="Enter what Mara Rox should say in her broadcast...">Mara Rox here, broadcasting from The Spire with breaking news from Ombra Prime.</textarea>
            
            <div class="dimension-buttons">
                <button class="dim-btn" id="dimPortrait" onclick="selectDimension('portrait')">📱 Portrait</button>
                <button class="dim-btn active" id="dimLandscape" onclick="selectDimension('landscape')">📺 Landscape</button>
                <button class="dim-btn" id="dimHd" onclick="selectDimension('hd')">⚡ HD</button>
            </div>
            
            <div class="mode-info">
                <span class="mode-badge" id="modeBadge">💎 Avatar Mode (billig)</span>
                <button class="mode-btn" id="modeBtn" onclick="toggleMode()">↔️ Byt till Agent</button>
            </div>
            
            <button class="btn" id="generateBtn" onclick="generateVideo()">Generate Video</button>
            <div class="status" id="statusBox"></div>
        </div>
        
        <div class="card">
            <div class="clips-header">
                <h2>📹 Recent Broadcasts</h2>
                <button class="refresh-btn" onclick="loadClips()">↻ Refresh</button>
            </div>
            <div id="clipsContainer">
                <div class="loading">Loading clips...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Detect local IP where bridge is running (fallback for local testing)
        const isLocalhost = window.location.hostname === 'localhost' || 
                          window.location.hostname === '127.0.0.1';
        const BRIDGE_URL = isLocalhost 
            ? 'http://localhost:3000' 
            : 'http://192.168.1.137:3000'; // Use fixed local IP for other origins
        
        // Load clips on page load
        document.addEventListener('DOMContentLoaded', loadClips);
        
        async function loadClips() {
            const container = document.getElementById('clipsContainer');
            container.innerHTML = '<div class="loading">Loading clips...</div>';
            
            try {
                const response = await fetch(`${BRIDGE_URL}/api/heygen/clips`);
                const data = await response.json();
                
                if (data.error) {
                    container.innerHTML = `<div class="empty"><p>Error loading clips: ${data.error}</p></div>`;
                    return;
                }
                
                if (!data.clips || data.clips.length === 0) {
                    container.innerHTML = `
                        <div class="empty">
                            <div class="empty-icon">📭</div>
                            <p>No broadcasts yet</p>
                            <p>Generate your first Mara Rox broadcast above!</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = data.clips.map(clip => `
                    <div class="clip-item">
                        <div class="clip-info">
                            <h3>${formatDate(clip.created)} ${clip.type === 'news' ? '📝' : '📹'}</h3>
                            <p>${clip.type === 'news' ? 'News Script' : 'Video'} | ${clip.size ? Math.round(clip.size/1024) + ' KB' : ''}</p>
                            <p class="prompt">"${truncate(clip.prompt || clip.filename, 80)}"</p>
                        </div>
                        <div class="clip-actions">
                            ${clip.video_url ? `<a href="${clip.video_url}" target="_blank">▶ Watch</a>` : ''}
                            ${clip.video_page_url ? `<a href="${clip.video_page_url}" target="_blank">📺 HeyGen</a>` : ''}
                            ${clip.type === 'news' ? `<a href="/heygen_output/mara_rox_news/${clip.filename}" target="_blank">📄 View</a>` : ''}
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                container.innerHTML = `<div class="empty"><p>Failed to load clips. Is the bridge server running?</p></div>`;
            }
        }
        
        let selectedDimension = 'landscape';
        let selectedMode = 'avatar'; // 'avatar' or 'agent'
        
        function selectDimension(dim) {
            selectedDimension = dim;
            document.querySelectorAll('.dim-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('dim' + dim.charAt(0).toUpperCase() + dim.slice(1)).classList.add('active');
        }
        
        function toggleMode() {
            if (selectedMode === 'avatar') {
                selectedMode = 'agent';
                document.getElementById('modeBadge').textContent = '🎬 Agent Mode (dyrt!)';
                document.getElementById('modeBadge').classList.add('agent');
                document.getElementById('modeBtn').textContent = '↔️ Byt till Avatar';
            } else {
                selectedMode = 'avatar';
                document.getElementById('modeBadge').textContent = '💎 Avatar Mode (billig)';
                document.getElementById('modeBadge').classList.remove('agent');
                document.getElementById('modeBtn').textContent = '↔️ Byt till Agent';
            }
        }
        
        async function generateVideo() {
            const input = document.getElementById('scriptInput');
            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('statusBox');
            
            const prompt = input.value.trim();
            if (!prompt) {
                showStatus('Please enter a script for Mara Rox to say.', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Generating...';
            btn.classList.add('generating');
            showStatus(`Starting video generation (${selectedMode}, ${selectedDimension})... This may take 5-15 minutes.`, '');
            
            try {
                const response = await fetch(`${BRIDGE_URL}/api/heygen/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt, 
                        dimension: selectedDimension,
                        mode: selectedMode
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showStatus(`Error: ${data.error}`, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Generate Video';
                    btn.classList.remove('generating');
                    return;
                }
                
                showStatus(`✓ ${data.message}`, 'success');
                btn.disabled = false;
                btn.textContent = 'Generate Video';
                btn.classList.remove('generating');
                
                // Refresh clips after a moment
                setTimeout(loadClips, 2000);
                
            } catch (error) {
                showStatus(`Failed to start generation: ${error.message}`, 'error');
                btn.disabled = false;
                btn.textContent = 'Generate Video';
                btn.classList.remove('generating');
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('statusBox');
            status.textContent = message;
            status.className = 'status show ' + type;
        }
        
        function formatDate(isoString) {
            if (!isoString) return 'Unknown';
            const date = new Date(isoString);
            return date.toLocaleString('sv-SE', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function truncate(text, length) {
            if (!text) return '';
            return text.length > length ? text.substring(0, length) + '...' : text;
        }
    </script>
</body>
</html>
