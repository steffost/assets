<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ombra Prime Music Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --cyan: #00f7ff;
            --gold: #ffd700;
            --dark-bg: #1a1a1a;
            --panel-bg: #252525;
            --charcoal: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
        }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 247, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 247, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        header {
            text-align: center;
            padding: 40px 20px;
            border: 1px solid var(--cyan);
            background: rgba(0, 247, 255, 0.05);
            margin-bottom: 40px;
            position: relative;
        }
        
        header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
        }
        
        .registry-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: var(--cyan);
            margin-bottom: 15px;
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--cyan);
            text-decoration: none;
            font-size: 0.85rem;
        }
        
        .back-link:hover { text-decoration: underline; }
        
        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 247, 255, 0.3);
            padding: 30px;
            margin-bottom: 25px;
        }
        
        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: var(--cyan);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 247, 255, 0.2);
        }
        
        .input-group { margin-bottom: 20px; }
        
        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        textarea {
            width: 100%;
            height: 120px;
            background: var(--charcoal);
            border: 1px solid rgba(0, 247, 255, 0.3);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            padding: 15px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--cyan);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--cyan);
        }
        
        .checkbox-group label {
            font-size: 0.85rem;
        }
        
        .btn {
            background: linear-gradient(135deg, var(--cyan), #00a0a0);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.5);
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            background: var(--charcoal);
            border: 1px solid rgba(0, 247, 255, 0.2);
            font-size: 0.85rem;
        }
        
        .status.success { border-color: var(--gold); }
        .status.error { border-color: #ff4444; color: #ff6666; }
        
        .music-list {
            margin-top: 30px;
        }
        
        .music-item {
            background: var(--charcoal);
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 247, 255, 0.2);
        }
        
        .music-item h3 {
            font-size: 1rem;
            color: var(--cyan);
            margin-bottom: 10px;
        }
        
        .music-item audio {
            width: 100%;
            margin: 10px 0;
        }
        
        .music-item .meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading.active { display: block; }
        
        .spinner {
            border: 3px solid var(--charcoal);
            border-top: 3px solid var(--cyan);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .note {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="controlpanel.html" class="back-link">← Control Center</a>
        
        <header>
            <div class="registry-badge">OMBRA PRIME</div>
            <h1>🎵 Music Studio</h1>
        </header>
        
        <div class="panel">
            <div class="panel-title">GENERATE MUSIC</div>
            
            <div class="input-group">
                <label for="title">Track Title (optional)</label>
                <input type="text" id="title" placeholder="My Awesome Track" style="width:100%;background:var(--charcoal);border:1px solid rgba(0,247,255,0.3);color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.9rem;padding:10px;margin-bottom:15px;">
            </div>

            <div class="input-group">
                <label for="prompt">Music Description</label>
                <textarea id="prompt" placeholder="Describe the music you want... e.g., 'Cinematic dark ambient, deep space atmosphere, low frequency synth bass, slow tempo'"></textarea>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="instrumental" checked>
                <label for="instrumental">Instrumental (no vocals)</label>
            </div>
            
            <div class="input-group" id="lyricsGroup" style="display: none;">
                <label for="lyrics">Lyrics (if not instrumental)</label>
                <textarea id="lyrics" placeholder="[verse]&#10;The machine connects&#10;A new world awaits&#10;[chorus]"></textarea>
            </div>
            
            <button class="btn" id="generateBtn" onclick="generateMusic()">GENERATE</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating music... (takes 1.5-3 minutes)</p>
            </div>
            
            <div class="status" id="status" style="display: none;"></div>
        </div>
        
        <div class="panel music-list">
            <div class="panel-title">RECENT GENERATIONS</div>
            <div id="musicList">
                <p class="note">No music generated yet. Your generated music will appear here.</p>
            </div>
        </div>
    </div>
    
    <script>
        const BRIDGE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000' 
            : 'http://' + window.location.hostname + ':3000';
        
        // Toggle lyrics field based on instrumental checkbox
        document.getElementById('instrumental').addEventListener('change', function() {
            document.getElementById('lyricsGroup').style.display = this.checked ? 'none' : 'block';
        });
        
        async function generateMusic() {
            const title = document.getElementById('title').value.trim();
            const prompt = document.getElementById('prompt').value.trim();
            const isInstrumental = document.getElementById('instrumental').checked;
            const lyrics = document.getElementById('lyrics').value.trim();
            
            if (!prompt) {
                showStatus('Please enter a music description', 'error');
                return;
            }
            
            if (!isInstrumental && !lyrics) {
                showStatus('Please enter lyrics or check "instrumental"', 'error');
                return;
            }
            
            document.getElementById('loading').classList.add('active');
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('status').style.display = 'none';
            
            try {
                const response = await fetch(BRIDGE_URL + '/api/music/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        title: title || null,
                        is_instrumental: isInstrumental,
                        lyrics: lyrics
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showStatus('Error: ' + data.error, 'error');
                } else if (data.id) {
                    showStatus('Music queued! ID: ' + data.id + ' - Check /api/music/clips for status', 'success');
                    loadMusicList();
                }
            } catch (err) {
                showStatus('Connection error: ' + err.message, 'error');
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('generateBtn').disabled = false;
            }
        }
        
        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
            el.style.display = 'block';
        }
        
        async function loadMusicList() {
            try {
                const response = await fetch(BRIDGE_URL + '/api/music/clips');
                const data = await response.json();
                
                if (data.clips && data.clips.length > 0) {
                    let html = '';
                    data.clips.forEach(clip => {
                        html += '<div class="music-item">';
                        html += '<h3>' + (clip.name || 'Untitled') + '</h3>';
                        html += '<audio controls src="' + clip.url + '"></audio>';
                        html += '<div class="meta">Generated: ' + clip.date + '</div>';
                        html += '</div>';
                    });
                    document.getElementById('musicList').innerHTML = html;
                }
            } catch (err) {
                console.log('Could not load music list');
            }
        }
        
        // Load music list on page load
        loadMusicList();
    </script>
</body>
</html>
