<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ombra Prime // Assets</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f7ff;
            --gold: #ff9d00;
            --dark-bg: #050608;
            --panel-bg: #0d0f14;
            --panel-border: #1a2030;
            --text-primary: #e0e6ed;
            --text-secondary: #6a7a8a;
            --glow-cyan: 0 0 20px rgba(0, 247, 255, 0.4);
            --glow-gold: 0 0 15px rgba(255, 157, 0, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: linear-gradient(rgba(0, 247, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 247, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .header {
            background: linear-gradient(180deg, #0a0d12 0%, var(--dark-bg) 100%);
            border-bottom: 1px solid var(--panel-border);
            padding: 40px;
            text-align: center;
            position: relative;
        }
        .header::before {
            content: "";
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            box-shadow: var(--glow-cyan);
        }
        .corner { position: absolute; width: 40px; height: 40px; border: 1px solid var(--cyan); opacity: 0.3; }
        .corner.tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .corner.tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .corner.bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .corner.br { bottom: 10px; right: 10px; border-left: none; border-top: none; }
        .tag { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; letter-spacing: 5px; color: var(--cyan); text-transform: uppercase; margin-bottom: 15px; opacity: 0.7; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; color: var(--gold); text-shadow: var(--glow-gold); letter-spacing: 4px; }
        .subtitle { color: var(--text-secondary); font-size: 0.8rem; margin-top: 10px; }
        .back-link { display: inline-block; margin-top: 20px; color: var(--cyan); text-decoration: none; font-size: 0.75rem; letter-spacing: 2px; border: 1px solid var(--cyan); padding: 8px 16px; transition: all 0.3s; }
        .back-link:hover { background: rgba(0, 247, 255, 0.1); box-shadow: var(--glow-cyan); }
        .main { max-width: 1400px; margin: 0 auto; padding: 40px; }
        .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .asset-card {
            background: var(--panel-bg);
            border: 2px solid var(--panel-border);
            padding: 20px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            position: relative;
        }
        .asset-card:hover { transform: translateY(-5px); border-color: var(--cyan); box-shadow: var(--glow-cyan); }
        .asset-card::before { content: ""; position: absolute; top: 0; left: 20px; right: 20px; height: 2px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); opacity: 0; transition: opacity 0.3s; }
        .asset-card:hover::before { opacity: 1; }
        .asset-wireframe { width: 100%; aspect-ratio: 1; object-fit: contain; background: #000; margin-bottom: 15px; border: 1px solid var(--panel-border); }
        .asset-name { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--cyan); letter-spacing: 1px; margin-bottom: 5px; }
        .asset-desc { font-size: 0.7rem; color: var(--text-secondary); line-height: 1.5; }
        .footer { text-align: center; padding: 40px; border-top: 1px solid var(--panel-border); margin-top: 40px; }
        .footer-text { font-size: 0.6rem; letter-spacing: 3px; color: var(--text-secondary); opacity: 0.4; text-transform: uppercase; }
        .scanlines { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 9999; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03), rgba(0,0,0,0.03) 1px, transparent 1px, transparent 2px); }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <header class="header">
        <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
        <div class="tag">Ombra Prime // Technical Registry</div>
        <h1>ASSET LIBRARY</h1>
        <div class="subtitle">17 Registered Technical Artifacts</div>
        <a href="../" class="back-link">← REGISTRY HUB</a>
    </header>
    <main class="main">
        <div class="asset-grid" id="assetGrid"></div>
    </main>
    <footer class="footer"><div class="footer-text">Ombra Prime Asset Registry</div></footer>
    <script>
        const assets = [
            { name: "Breathstone", desc: "Atmospheric processing unit" },
            { name: "Graviton Balance Brace", desc: "Gravity stabilization tool" },
            { name: "Myco Carafe", desc: "Living preservation container" },
            { name: "Oris MK7 Bioscan Wand", desc: "Medical diagnostic device" },
            { name: "Pulse Cord", desc: "Emergency life-line system" },
            { name: "The Dewpoint", desc: "Atmospheric water collector" },
            { name: "The Mosswell Personal Cultivator", desc: "Bio-growth chamber" },
            { name: "The Nighthand", desc: "Night operation tool" },
            { name: "The Pulse Chalice", desc: "Energy vessel" },
            { name: "The Pulse Wand", desc: "Energy projection device" },
            { name: "The Svep Svampen", desc: "Moisture mote" },
            { name: "The Terrarion Vessel", desc: "Field transport container" },
            { name: "The Void Crawler", desc: "Survey skiff Mark VII" },
            { name: "The Whisper Reed", desc: "Atmospheric sensor" },
            { name: "The Whisper Vessel", desc: "Sensor containment" },
            { name: "Vitalis Resonator Ring", desc: "Biometric scanner" },
            { name: "Vita Pin", desc: "Vital injection system" }
        ];
        const grid = document.getElementById('assetGrid');
        assets.forEach(a => {
            grid.innerHTML += '<a href="./' + a.name.replace(/ /g, '_') + '.html" class="asset-card"><img src="./' + a.name.replace(/ /g, '_') + '_wireframe.png" class="asset-wireframe" alt="' + a.name + '"><div class="asset-name">' + a.name + '</div><div class="asset-desc">' + a.desc + '</div></a>';
        });
    </script>
</body>
</html>
